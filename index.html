<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation à une aventure</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@300;400;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
/* ─── STYLES ET ANIMATIONS ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean:#1a8cbc;--deep:#04192b;--sand:#f0e0b0;--coral:#e96040;
  --yellow:#f5c930;--mint:#5ecfb0;--pink:#f2799f;--lilac:#c5a8f0;
  --white:#fefcf8;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--deep);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
}

.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bubble{
  position:absolute;bottom:-80px;border-radius:50%;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  animation:rise linear infinite;
}
@keyframes rise{to{transform:translateY(-110vh);opacity:0}}

.page{position:relative;z-index:1; transition: opacity 0.6s ease;}

/* ─── ETATS DES PAGES ─── */
#enigmePage{ display: none; opacity: 0; }
#reveal{ display: none; text-align: center; padding-top: 100px; }

/* ─── COFFRE PIRATE (CORRIGÉ) ─── */
.safe-container{ min-height:100vh; display:flex; flex-direction: column; align-items:center; justify-content:center; padding:20px; }
.safe-wrapper{ 
  position:relative; 
  width: 300px; 
  height: 300px; 
  background:#1a0e05; 
  border:3px solid #daa520; 
  border-radius:24px; 
  overflow:hidden; 
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
#scratchCanvasSafe{ 
  position:absolute; 
  top:0; 
  left:0; 
  width: 100%; 
  height: 100%; 
  z-index:2; 
  touch-action:none; 
  cursor: crosshair; 
}
.treasure-under{ 
  position:absolute; 
  inset:0; 
  display:flex; 
  flex-direction:column; 
  align-items:center; 
  justify-content:center; 
  background:radial-gradient(#1a0e05, #000); 
  z-index:1; 
}

/* ─── UI ENIGME ─── */
.hero{ text-align:center; padding:40px 20px; }
.card{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:20px; margin:10px auto; max-width:500px; }
.digits { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
.dbox{ width:50px; height:65px; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); border-radius:12px; font-size:2rem; color:white; text-align:center; outline:none; }
.btn{ padding:15px 40px; background:linear-gradient(135deg, var(--pink), var(--coral)); border:none; border-radius:12px; color:white; font-weight:800; cursor:pointer; }
</style>
</head>
<body>

<div class="bubbles" id="bubbles"></div>

<div class="page" id="coffrePage">
  <div class="safe-container">
    <h2 style="color:var(--yellow); font-family:'Playfair Display'; margin-bottom:20px; text-align:center;">☠️ Gratte le coffre pour continuer... ☠️</h2>
    <div class="safe-wrapper">
      <div class="treasure-under">
        <div style="font-size:3.5rem;">🔓</div>
        <div style="color:gold; font-family:'DM Mono';">OUVERT</div>
      </div>
      <canvas id="scratchCanvasSafe"></canvas>
    </div>
  </div>
</div>

<div class="page" id="enigmePage">
  <div class="hero">
    <h1 style="margin-bottom:20px;">Une <em>Énigme</em> vous attend…</h1>
    <div class="card"><p><strong>Indice 1 :</strong> Nombre de cartes au début d'un UNO.</p></div>
    <div class="card"><p><strong>Indice 2 :</strong> Sets gagnants en Grand Chelem (Homme).</p></div>
    <div class="card" style="border-color:var(--mint);"><p><strong>Indices 3 & 4 :</strong> La somme des deux précédents.</p></div>
    
    <div class="digits">
      <input class="dbox" id="d1" maxlength="1" type="tel">
      <input class="dbox" id="d2" maxlength="1" type="tel">
      <input class="dbox" id="d3" maxlength="1" type="tel">
      <input class="dbox" id="d4" maxlength="1" type="tel">
    </div>
    <button class="btn" onclick="checkCode()">DÉVERROUILLER</button>
    <p id="errMsg" style="color:var(--coral); display:none; margin-top:15px;">❌ Code incorrect !</p>
  </div>
</div>

<div id="reveal" class="page">
    <h1 style="font-size:3rem;">Bravo ! 🎉</h1>
    <p style="font-size:1.2rem; opacity:0.8;">L'aventure peut enfin commencer...</p>
    <div style="font-size:5rem; margin-top:30px;">🚢🗺️✨</div>
</div>

<script>
/* ─── LOGIQUE DU COFFRE (FIXÉ) ─── */
const canvas = document.getElementById('scratchCanvasSafe');
const ctx = canvas.getContext('2d');
let isDrawing = false;

function initScratch() {
    // Fixe les dimensions réelles du canvas
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    
    // Remplit le canvas (couche à gratter)
    ctx.fillStyle = '#3d2b1f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Mode "gomme"
    ctx.globalCompositeOperation = 'destination-out';
}

function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

function scratch(e) {
    if (!isDrawing) return;
    const pos = getMousePos(e);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 30, 0, Math.PI * 2);
    ctx.fill();
    checkScratch();
}

function checkScratch() {
    const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let transparent = 0;
    for (let i = 3; i < pixels.length; i += 4) {
        if (pixels[i] === 0) transparent++;
    }
    // Si 50% est gratté, on change de page
    if (transparent / (pixels.length / 4) > 0.5) {
        canvas.style.display = 'none';
        document.getElementById('coffrePage').style.display = 'none';
        const next = document.getElementById('enigmePage');
        next.style.display = 'block';
        setTimeout(() => next.style.opacity = 1, 50);
    }
}

canvas.addEventListener('mousedown', () => isDrawing = true);
window.addEventListener('mouseup', () => isDrawing = false);
canvas.addEventListener('mousemove', scratch);
canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
canvas.addEventListener('touchend', () => isDrawing = false);
canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });

/* ─── LOGIQUE DU CODE ─── */
async function checkCode() {
    const val = document.getElementById('d1').value + document.getElementById('d2').value + 
                document.getElementById('d3').value + document.getElementById('d4').value;
    
    const encoder = new TextEncoder();
    const data = encoder.encode(val);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    // Hash pour "7310"
    if (hashHex === "599ba2df71991039869152b9561665a5e3077a28e08d6c8e3489839441f71dfc") {
        document.getElementById('enigmePage').style.display = 'none';
        const reveal = document.getElementById('reveal');
        reveal.style.display = 'block';
        setTimeout(() => reveal.style.opacity = 1, 50);
    } else {
        document.getElementById('errMsg').style.display = 'block';
    }
}

/* ─── AUTO-FOCUS ─── */
document.querySelectorAll('.dbox').forEach((input, index, inputs) => {
    input.addEventListener('input', () => {
        if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
    });
});

/* ─── BULLES ─── */
const container = document.getElementById('bubbles');
for(let i=0; i<15; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = Math.random() * 100 + '%';
    b.style.width = b.style.height = (Math.random() * 30 + 10) + 'px';
    b.style.animationDuration = (Math.random() * 5 + 5) + 's';
    b.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(b);
}

// Initialisation au chargement
window.onload = initScratch;
</script>

</body>
</html>
